<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!--
      Per-route <title>, description, canonical, Open Graph and Twitter tags
      are injected at runtime by src/components/Seo.js.
      What stays here is the fallback shown before React mounts, plus the
      static assets and hints that never vary by route.
    -->
    <title>AI Notes — Write notes, get instant summaries</title>
    <meta
      name="description"
      content="A free note-taking app that summarises your notes into bullet points, filters them by tag, searches full text, and exports to PDF, Markdown or JSON."
    />

    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light dark" />

    <link rel="icon" href="%PUBLIC_URL%/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon.svg" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Fonts: preconnect early, then load without blocking first paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>
      <div
        style="
          max-width: 640px;
          margin: 0 auto;
          padding: 48px 24px;
          font-family: system-ui, sans-serif;
          line-height: 1.6;
        "
      >
        <h1 style="font-size: 1.75rem; margin-bottom: 16px">AI Notes</h1>
        <p style="margin-bottom: 12px">
          AI Notes is a free note-taking app that turns long notes into short
          bullet-point summaries. It also supports tag filtering, full-text search
          across your notes, and export to PDF, Markdown or JSON.
        </p>
        <p>JavaScript is required to use the app. Please enable it and reload this page.</p>
      </div>
    </noscript>
    <div id="root"></div>
  </body>
</html>
